    <!-- Top Metrics Row -->
    <section class="metrics-container">
      <div class="metric-card">
        <span class="metric-label">Status do Agente</span>
        <span id="metric-status" class="metric-value text-muted">Inativo</span>
        <span class="metric-desc">Frequência automática de postagem</span>
      </div>
      <div class="metric-card">
        <span class="metric-label">Próxima Postagem</span>
        <span id="countdown-timer" class="metric-value color-accent">--:--:--</span>
        <span id="countdown-subtext" class="metric-desc">Agendador desativado</span>
      </div>
      <div class="metric-card">
        <span class="metric-label">Posts Hoje</span>
        <span id="metric-posted-today" class="metric-value">0</span>
        <span class="metric-desc">Últimas 24 horas</span>
      </div>
      <div class="metric-card">
        <span class="metric-label">Temas Ativos</span>
        <span id="metric-themes-count" class="metric-value">0</span>
        <span class="metric-desc">Focos de assunto do agente</span>
      </div>
      <div class="metric-card">
        <span class="metric-label">Taxa de Sucesso</span>
        <span id="metric-success-rate" class="metric-value">--%</span>
        <span class="metric-desc">Conclusão de posts s/ erros</span>
      </div>
      <div class="metric-card">
        <span class="metric-label">Engajamento Total</span>
        <span id="metric-total-interactions" class="metric-value" style="color: var(--color-ai);">0</span>
        <span id="metric-interactions-desc" class="metric-desc">0 curtidas · 0 reposts · 0 respostas</span>
      </div>
    </section>
