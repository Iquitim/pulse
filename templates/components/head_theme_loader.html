  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse — Agente de IA para Publicação Social Automatizada</title>
  <!-- Google Fonts - Inter & Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="/static/style.css?v=pulse-v18">
  <!-- Immediate Theme Loader to prevent flashes -->
  <script>
    (function() {
      const savedTheme = localStorage.getItem('pulse_theme') || 'dark';
      if (savedTheme === 'light') {
        document.documentElement.classList.add('light-theme');
      } else {
        document.documentElement.classList.remove('light-theme');
      }
    })();
  </script>
